# Пример конфигурации внешнего Nginx на VPS (SSL-терминация перед Docker).
# Скопируйте в /etc/nginx/sites-available/priem.gubkin.uz и перезагрузите nginx.
#
# Важно: client_max_body_size >= 420M (до 400 МБ файлов + запас на multipart).

server {
    listen 443 ssl http2;
    server_name priem.gubkin.uz;

    # ssl_certificate ...
    # ssl_certificate_key ...

    client_max_body_size 420M;
    client_body_timeout 900s;

    location / {
        proxy_pass http://127.0.0.1:8085;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }
}

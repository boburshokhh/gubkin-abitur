services:
  # 1. База данных PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: abitur-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgrespassword}
      POSTGRES_DB: ${POSTGRES_DB:-abitur}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - abitur-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d abitur"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # 2. Объектное хранилище MinIO
  minio:
    image: quay.io/minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: abitur-minio
    restart: always
    ports:
      - "9005:9000"  # S3 API
      - "9006:9001"  # MinIO Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadminpassword}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - abitur-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # 3. Бэкенд на Node.js/Express
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-local}
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: abitur-backend
    restart: always
    ports:
      - "3005:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgrespassword@db:5432/abitur}
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-production}
      ADMISSION_OPEN: ${ADMISSION_OPEN:-false}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:8085}
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret-before-production}
      TOKEN_PEPPER: ${TOKEN_PEPPER:-change-this-token-pepper-before-production}
      ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS:-900}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-30}
      EMAIL_TOKEN_TTL_MINUTES: ${EMAIL_TOKEN_TTL_MINUTES:-1440}
      PASSWORD_RESET_TOKEN_TTL_MINUTES: ${PASSWORD_RESET_TOKEN_TTL_MINUTES:-30}
      INVITATION_TOKEN_TTL_DAYS: ${INVITATION_TOKEN_TTL_DAYS:-7}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadminpassword}
      S3_BUCKET_DOCUMENTS: ${S3_BUCKET_DOCUMENTS:-application-documents}
      S3_BUCKET_FILES: ${S3_BUCKET_FILES:-application-files}
      SMTP_HOST: ${SMTP_HOST:-smtp.example.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_REJECT_UNAUTHORIZED: ${SMTP_REJECT_UNAUTHORIZED:-true}
      SMTP_USER: ${SMTP_USER:-noreply@example.com}
      SMTP_PASS: ${SMTP_PASS:-change-this-smtp-password}
      SMTP_FROM: ${SMTP_FROM:-noreply@example.com}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - abitur-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # 4. Фронтенд на Vue 3 / Nginx
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_ADMISSION_OPEN: ${VITE_ADMISSION_OPEN:-false}
        APP_VERSION: ${APP_VERSION:-local}
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: abitur-frontend
    restart: always
    ports:
      - "8085:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - abitur-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/frontend-health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  minio_data:

networks:
  abitur-network:
    driver: bridge

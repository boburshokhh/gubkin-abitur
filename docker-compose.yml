services:
  # 1. База данных PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: abitur-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: abitur
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - abitur-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d abitur"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # 2. Объектное хранилище MinIO
  minio:
    image: quay.io/minio/minio:RELEASE.2024-01-18T22-51-28Z-cpuv1
    container_name: abitur-minio
    restart: always
    ports:
      - "9005:9000"  # S3 API
      - "9006:9001"  # MinIO Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - abitur-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # 3. Бэкенд на Node.js/Express
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: abitur-backend
    restart: always
    ports:
      - "3005:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgrespassword@db:5432/abitur
      PORT: 3000
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:?FRONTEND_ORIGIN is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      TOKEN_PEPPER: ${TOKEN_PEPPER:?TOKEN_PEPPER is required}
      ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS:-900}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-30}
      EMAIL_TOKEN_TTL_MINUTES: ${EMAIL_TOKEN_TTL_MINUTES:-1440}
      PASSWORD_RESET_TOKEN_TTL_MINUTES: ${PASSWORD_RESET_TOKEN_TTL_MINUTES:-30}
      INVITATION_TOKEN_TTL_DAYS: ${INVITATION_TOKEN_TTL_DAYS:-7}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadminpassword
      S3_BUCKET_DOCUMENTS: application-documents
      S3_BUCKET_FILES: application-files
      SMTP_HOST: ${SMTP_HOST:?SMTP_HOST is required}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_REJECT_UNAUTHORIZED: ${SMTP_REJECT_UNAUTHORIZED:-true}
      SMTP_USER: ${SMTP_USER:?SMTP_USER is required}
      SMTP_PASS: ${SMTP_PASS:?SMTP_PASS is required}
      SMTP_FROM: ${SMTP_FROM:?SMTP_FROM is required}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - abitur-network

  # 4. Фронтенд на Vue 3 / Nginx
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: abitur-frontend
    restart: always
    ports:
      - "8085:80"
    depends_on:
      - backend
    networks:
      - abitur-network

volumes:
  postgres_data:
  minio_data:

networks:
  abitur-network:
    driver: bridge

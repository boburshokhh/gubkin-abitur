server {
    listen 80;
    server_name localhost;

    # Docker DNS: без этого nginx кэширует IP backend при пересоздании контейнера → 502
    resolver 127.0.0.11 ipv6=off valid=10s;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location = /frontend-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Проксирование запросов к API на бэкенд-контейнер
    location /api/ {
        set $backend_upstream http://backend:3000;
        proxy_pass $backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Лимиты на загрузку файлов
        client_max_body_size 15M;
        client_body_timeout 300s;

        # Таймауты для медленных соединений — даём 5 минут на загрузку файла
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;
    }

    # Socket.IO realtime transport
    location /socket.io/ {
        set $backend_upstream http://backend:3000;
        proxy_pass $backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Проксирование health check
    location /health {
        set $backend_upstream http://backend:3000;
        proxy_pass $backend_upstream/health;
        proxy_set_header Host $host;
    }

    # Настройки кэширования для статики
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|mp4|webm)$ {
        root /usr/share/nginx/html;
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

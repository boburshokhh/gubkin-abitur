server {
    listen 80;
    server_name localhost;

    # До 5 файлов по 50 МБ каждый, суммарно до 400 МБ (+ запас на multipart)
    client_max_body_size 420M;
    client_body_timeout 900s;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location = /frontend-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # API — ^~ чтобы regex статики не перехватывал /api/.../file.png или .pdf
    location ^~ /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Лимиты на загрузку файлов (дублируем на уровне location)
        client_max_body_size 420M;
        client_body_timeout 900s;

        # Таймауты для медленных соединений и крупных загрузок
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
        proxy_connect_timeout 30s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Socket.IO realtime transport
    location /socket.io/ {
        proxy_pass http://backend:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Проксирование health check
    location /health {
        proxy_pass http://backend:3000/health;
        proxy_set_header Host $host;
    }

    # Статика фронтенда (не /api/)
    location ~* ^/(?!api/).*\.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|mp4|webm)$ {
        root /usr/share/nginx/html;
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
